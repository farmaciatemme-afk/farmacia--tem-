<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa - Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  position: relative;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("logo.jpg") no-repeat center;
  background-size: cover;
  filter: blur(15px);
  transform: scale(1.2);
  opacity: 0.5;
}

.container {
  position: relative;
  z-index: 1;
}

.card {
  width: 350px;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

p {
  text-align: center;
  margin-bottom: 20px;
  color: #444;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #222;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #000;
}

/* estrelas */
.stars {
  display: flex;
  gap: 5px;
  font-size: 25px;
  cursor: pointer;
  margin-top: 10px;
}

.star {
  color: #ccc;
}

.star.active {
  color: gold;
}

.success {
  display: none;
  text-align: center;
  margin-top: 15px;
  color: green;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>💊 Sua opinião importa</h2>
    <p>Farmácia Tem</p>

    <form id="form">

      <label>Como foi o atendimento?</label>
      <select id="atendimento" required>
        <option value="">Selecione</option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>

      <label>Encontrou o que precisava?</label>
      <select id="encontrou" required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>O que você procurava?</label>
      <input type="text" id="produto">

      <label>Voltaria a comprar?</label>
      <select id="voltaria" required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>

      <label>Avaliação</label>
      <div class="stars">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>

      <label>Sugestões</label>
      <textarea id="comentario"></textarea>

      <button type="submit">Enviar</button>

    </form>

    <div id="msg" class="success">Obrigado!</div>
  </div>
</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

// estrelas
stars.forEach((star, index) => {
  star.addEventListener("click", () => {
    nota = index + 1;
    stars.forEach((s, i) => {
      s.classList.toggle("active", i < nota);
    });
  });
});

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const produto = document.getElementById("produto").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    body: JSON.stringify({
      atendimento,
      encontrou,
      produto,
      voltaria,
      nota,
      comentario
    })
  })
  .then(() => {
    document.getElementById("msg").style.display = "block";
    document.getElementById("form").reset();
    nota = 0;
    stars.forEach(s => s.classList.remove("active"));
  })
  .catch(() => {
    alert("Erro ao enviar");
  });

});
</script>

</body>
</html>
