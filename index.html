<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.8), rgba(22,160,133,0.8)),
    url('logo.png');
  background-size: cover;
  background-position: center;
  filter: blur(12px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  padding-bottom: 120px;
  position: relative;
  z-index: 1;
}

/* TABS */
.tabs {
  display: flex;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  overflow: hidden;
}

.tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: white;
  color: #1abc9c;
}

/* ABAS */
.aba {
  display: none;
  opacity: 0;
  transform: translateY(15px);
  transition: all 0.3s ease;
}

.aba.ativa {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 25px;
  margin-top: 30px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* LOGO */
.logo {
  width: 110px;
  display: block;
  margin: 10px auto;
}

/* TITULO */
.titulo {
  text-align: center;
  margin-bottom: 20px;
}

/* CAMPOS ESTILO NUBANK */
.field {
  position: relative;
  margin: 20px auto;
  width: 100%;
  max-width: 500px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 18px 14px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 15px;
  background: #fff;
  outline: none;
  transition: all 0.25s ease;
}

/* LABEL DENTRO */
.field label {
  position: absolute;
  left: 14px;
  top: 16px;
  color: #999;
  font-size: 14px;
  pointer-events: none;
  transition: all 0.25s ease;
  background: white;
  padding: 0 5px;
}

/* ANIMAÇÃO */
.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

/* FOCO */
.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: #1abc9c;
  box-shadow: 0 0 0 3px rgba(26,188,156,0.15);
  transform: scale(1.02);
}

/* ESTRELAS */
.stars {
  display: flex;
  justify-content: center;
  font-size: 30px;
  margin-top: 10px;
}

.star {
  color: #ccc;
  cursor: pointer;
  transition: 0.2s;
}

.star:hover {
  transform: scale(1.2);
}

/* BOTÕES */
.big-btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.whatsapp {
  background: #25d366;
}

/* FEEDBACK */
.feedback {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  text-align: center;
}

/* BOTÃO FLUTUANTE */
.whats-float {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #25d366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.whats-float img {
  width: 30px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="trocarAba('form')">📝 Avaliação</button>
    <button class="tab" onclick="trocarAba('whats')">💬 WhatsApp</button>
  </div>

  <!-- FORM -->
  <div id="form" class="aba ativa">

    <div class="card">
      <img src="logo.png" class="logo">

      <div class="titulo">
        <h2>💊 Farmácia Tem</h2>
        <p>Avalie nosso atendimento</p>
      </div>

      <div class="field">
        <select id="atendimento" required>
          <option value="" disabled selected hidden></option>
          <option>Excelente</option>
          <option>Bom</option>
          <option>Regular</option>
          <option>Ruim</option>
        </select>
        <label>Como foi o atendimento?</label>
      </div>

      <div class="field">
        <select id="encontrou" required>
          <option value="" disabled selected hidden></option>
          <option>Sim</option>
          <option>Não</option>
        </select>
        <label>Encontrou o que precisava?</label>
      </div>

      <div class="field">
        <input type="text" id="produto" placeholder=" " required>
        <label>O que você procurava?</label>
      </div>

      <div class="field">
        <select id="voltaria" required>
          <option value="" disabled selected hidden></option>
          <option>Sim</option>
          <option>Talvez</option>
          <option>Não</option>
        </select>
        <label>Voltaria a comprar?</label>
      </div>

      <label style="text-align:center;">Avaliação</label>
      <div class="stars">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>

      <div class="field">
        <textarea id="comentario" placeholder=" "></textarea>
        <label>Sugestões</label>
      </div>

      <button class="big-btn" onclick="enviar()">Enviar Avaliação</button>
    </div>

    <div class="card">
      <h3 style="text-align:center;">💬 Feedback</h3>
      <div id="lista">Carregando avaliações...</div>
    </div>

  </div>

  <!-- WHATS -->
  <div id="whats" class="aba">
    <div class="card" style="text-align:center;">
      <h3>💬 Fale conosco</h3>
      <p>Clique abaixo para falar direto no WhatsApp</p>

      <a href="https://wa.me/5588997428848?text=Olá!%20😊%20Vim%20pelo%20site%20da%20Farmácia%20Tem.%20Pode%20me%20ajudar?" target="_blank">
        <button class="big-btn whatsapp">Falar no WhatsApp</button>
      </a>
    </div>
  </div>

</div>

<!-- BOTÃO FLUTUANTE -->
<a href="https://wa.me/5588997428848?text=Olá!%20😊%20Vim%20pelo%20site%20da%20Farmácia%20Tem.%20Pode%20me%20ajudar?"
   class="whats-float" target="_blank">
   <img src="whatsapp.png">
</a>

<script>
function trocarAba(id) {
  document.querySelectorAll(".aba").forEach(a => a.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

let nota = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.style.color = i < nota ? "gold" : "#ccc");
  };
});

function enviar() {
  alert("Avaliação enviada!");
}
</script>

</body>
</html>
