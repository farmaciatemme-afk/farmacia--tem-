<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farmácia Tem</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1abc9c,#16a085);
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:22px;
  padding:20px;
  margin-top:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}

/* LOGO */
.logo{
  width:70px;
  display:block;
  margin:10px auto;
  border-radius:16px;
  background:#fff;
  padding:8px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

/* TITULO */
h2{margin:0;text-align:center;font-size:20px}
p{margin:5px 0 12px;text-align:center;color:#666}

/* CAMPOS */
.field{margin:12px 0}
.field input,
.field select,
.field textarea{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:15px;
}

/* ESTRELAS */
.stars{text-align:center;font-size:30px}
.star{color:#ccc;cursor:pointer;transition:.2s}

/* BOTÃO */
.big-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#e53935;
  color:#fff;
  font-weight:bold;
  margin-top:15px;
}

/* FEEDBACK */
.feedback{
  background:#f6f6f6;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

/* WHATS */
.whats{
  position:fixed;
  bottom:18px;
  right:18px;
  width:70px;
  height:70px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 25px rgba(0,0,0,.3);
  animation:pulse 1.4s infinite;
  z-index:999;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.12)}
  100%{transform:scale(1)}
}
.whats img{width:34px}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader{
  width:65px;
  height:65px;
  border:6px solid #eee;
  border-top:6px solid #1abc9c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="container">

<div class="card">

<!-- LOGO -->
<img src="logo.png" class="logo">

<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>

<div class="field">
<input id="atendente" placeholder="Nome do atendente">
</div>

<div class="field">
<select id="atendimento">
<option value="">Atendimento</option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="field">
<select id="encontrou">
<option value="">Encontrou?</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<input id="produto" placeholder="Produto">
</div>

<div class="field">
<select id="voltaria">
<option value="">Voltaria?</option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder="Sugestões"></textarea>
</div>

<button class="big-btn" onclick="enviar()">Enviar avaliação</button>
</div>

<div class="card">
<h3>Feedback (<span id="total">0</span>)</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848?text=Olá! Preciso de ajuda."
class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
<div class="loader"></div>
<p style="margin-top:15px">Enviando sua avaliação...</p>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const URL="https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota=0;

/* estrelas */
document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

/* ENVIAR */
function enviar(){

  if(!atendente.value || !atendimento.value || !encontrou.value || !voltaria.value || nota===0){
    alert("Preencha tudo!");
    return;
  }

  let ultimo=localStorage.getItem("tempo");
  let agora=Date.now();

  if(ultimo && agora-ultimo<600000){
    alert("Aguarde 10 minutos para avaliar novamente");
    return;
  }

  overlay.style.display="flex";

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      atendente:atendente.value,
      atendimento:atendimento.value,
      encontrou:encontrou.value,
      produto:produto.value,
      voltaria:voltaria.value,
      nota:nota,
      comentario:comentario.value
    })
  })
  .then(()=>{

    localStorage.setItem("tempo",agora);

    setTimeout(()=>{
      alert("Obrigado! 🙌 Agora avalie no Google ⭐");
    },600);

    setTimeout(()=>{
      window.open("https://g.page/r/Cewsxt13lIojEAE/review","_blank");
    },1300);

    setTimeout(()=>{
      location.reload();
    },2500);

  })
  .catch(()=>{
    alert("Erro ao enviar");
    location.reload();
  });
}

/* FEEDBACK */
async function carregar(){
  let res=await fetch(URL);
  let data=await res.json();

  lista.innerHTML="";
  total.innerText=data.length;

  data.reverse().forEach(f=>{
    if(!f.Nota) return;

    lista.innerHTML+=`
    <div class="feedback">
      ⭐ ${f.Nota}<br>
      ${f.Comentario||""}
    </div>`;
  });
}

setInterval(carregar,5000);
carregar();
</script>

</body>
</html>
