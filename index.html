<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  display: flex;
  justify-content: center;
}

/* fundo */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("logo.jpg") no-repeat center;
  background-size: cover;
  filter: blur(12px);
  opacity: 0.4;
}

/* container geral */
.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* layout desktop */
@media (min-width: 700px) {
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
}

/* card */
.card {
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 15px;
}

/* logo */
.logo {
  width: 120px;
  display: block;
  margin: 0 auto 10px;
  border-radius: 15px;
}

/* título */
h2, h3 {
  text-align: center;
}

/* estrelas */
.stars {
  display: flex;
  justify-content: center;
  font-size: 35px;
  margin: 10px 0;
}

.star {
  color: #ccc;
  cursor: pointer;
  padding: 5px;
}

.star.active {
  color: gold;
}

/* textarea */
textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* botão */
.big-btn {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #007aff;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.big-btn:hover {
  background: #005ecb;
}

/* feedback */
.feedback {
  background: #eee;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.media {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="card">

    <img src="logo.jpg" class="logo">

    <h2>💊 Avalie nosso atendimento</h2>

    <div id="media" class="media">Carregando...</div>

    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <textarea id="comentario" placeholder="Digite sua opinião..."></textarea>

    <button class="big-btn" onclick="enviar()">Enviar avaliação</button>
  </div>

  <!-- FEEDBACK -->
  <div class="card">
    <h3>💬 Clientes</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

// estrelas
stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

// enviar
function enviar() {
  const comentario = document.getElementById("comentario").value;

  if(nota === 0){
    alert("Selecione uma avaliação!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    body: JSON.stringify({
      nota,
      comentario
    })
  })
  .then(() => {
    alert("Obrigado!");
    location.reload();
  });
}

// JSON da planilha
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

// carregar dados
async function carregar(){
  const res = await fetch(URL);
  const data = await res.json();

  let total = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.reverse().forEach(f=>{
    total += Number(f.Nota);

    let div = document.createElement("div");
    div.className = "feedback";
    div.innerHTML = `⭐ ${f.Nota} - ${f.Comentario || ""}`;
    lista.appendChild(div);
  });

  let media = total / data.length;
  document.getElementById("media").innerText =
    "⭐ Média: " + media.toFixed(1);
}

carregar();
</script>

</body>
</html>
