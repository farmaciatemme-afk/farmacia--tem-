<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa de Satisfação - Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* FUNDO COM LOGO */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  background: #000;
}

/* LOGO COMO FUNDO */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('logo.jpg');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  filter: blur(15px);
  transform: scale(1.2);
  opacity: 0.4;
  z-index: 0;
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

/* TEXTO */
.card h2 {
  text-align: center;
  color: #2e7d32;
  margin-bottom: 10px;
}

.card p {
  text-align: center;
  color: #555;
  margin-bottom: 20px;
}

/* INPUTS */
label {
  font-weight: 600;
  margin-top: 12px;
  display: block;
  color: #333;
}

input, select, textarea {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
}

input:focus, select:focus, textarea:focus {
  border-color: #2e7d32;
  outline: none;
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* MENSAGEM */
.success {
  display: none;
  text-align: center;
  color: #2e7d32;
  font-weight: bold;
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: #e8f5e9;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>💊 Sua opinião importa</h2>
    <p>Farmácia Tem: Ajude-nos a melhorar</p>

    <form id="form">

      <label>Como foi o atendimento?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>

      <label>Encontrou o que precisava?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>O que você procurava?</label>
      <input type="text" placeholder="Ex: medicamentos, vitaminas...">

      <label>Voltaria a comprar conosco?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>

      <label>Sugestões</label>
      <textarea rows="3" placeholder="Deixe sua opinião..."></textarea>

      <button type="submit">Enviar avaliação</button>

    </form>

    <div id="msg" class="success">
      ✅ Obrigado pela sua resposta!
    </div>

  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("msg").style.display = "block";
  this.style.display = "none";
});
</script>

</body>
</html>
