<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmácia Tem</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f8fafc;color:#1f2937}
.container{max-width:1200px;margin:auto;padding:0 20px}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0;background:#fff}
.logo{height:50px}
.nav a{text-decoration:none;color:#374151;margin-left:20px}

/* HERO */
.hero{background:linear-gradient(to right,#ecfeff,#fff);padding:80px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.hero-text{max-width:500px}
.hero h1{font-size:48px}
.hero span{color:#0f766e}
.hero p{margin:20px 0}
.hero button{padding:14px 24px;background:#0f766e;color:#fff;border:none;border-radius:10px}

/* CARDS */
.section{padding:80px 0;text-align:center}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:30px}
.card{background:#fff;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.05)}

/* FORM */
.form{background:#fff;padding:30px;border-radius:20px;max-width:450px;margin:40px auto;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.form input,.form select,.form textarea{width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd}
.form button{width:100%;padding:14px;background:#ef4444;color:#fff;border:none;border-radius:10px}

/* CTA */
.cta{background:#0f766e;color:#fff;padding:60px;text-align:center;margin-top:60px}

/* WHATS */
.whats{position:fixed;bottom:20px;right:20px;width:65px;height:65px;background:#25d366;border-radius:50%;display:flex;justify-content:center;align-items:center}

/* RESPONSIVO */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center}
.cards{grid-template-columns:1fr}
}
</style>

</head>

<body>

<!-- NAV -->

<div class="nav container">
<img src="logo.png" class="logo">
<div>
<a>Início</a>
<a>Serviços</a>
<a>Contato</a>
</div>
</div>

<!-- HERO -->

<div class="hero container">
<div class="hero-text">
<h1>Sua saúde em primeiro lugar, <span>sempre.</span></h1>
<p>Medicamentos de qualidade e entrega rápida.</p>
<button onclick="window.location.href='https://wa.me/5588997428848'">
Falar no WhatsApp
</button>
</div>
<img src="logo.png" width="250">
</div>

<!-- SERVIÇOS -->

<div class="section container">
<h2>Por que escolher a Farmácia Tem?</h2>

<div class="cards">
<div class="card">💊 Medicamentos originais</div>
<div class="card">🚚 Entrega rápida</div>
<div class="card">👨‍⚕️ Atendimento humanizado</div>
</div>
</div>

<!-- FORM -->

<div class="form">
<h2>Avalie nosso atendimento</h2>

<input placeholder="Nome do atendente">
<select><option>Atendimento</option></select>
<textarea placeholder="Comentário"></textarea>

<button>Enviar</button>

</div>

<!-- CTA -->

<div class="cta">
<h2>Precisou? Fale com a gente no WhatsApp</h2>
</div>

</body>
</html>
