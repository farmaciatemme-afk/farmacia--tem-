<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  background: #1abc9c;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.85), rgba(22,160,133,0.85)),
    url('logo.png');
  background-size: cover;
  filter: blur(12px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 520px;
  padding: 15px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 25px;
  padding: 22px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* LOGO */
.logo {
  width: 85px;
  display: block;
  margin: 0 auto;
}

/* TITULO */
.titulo {
  text-align: center;
}

/* INPUT */
.field {
  position: relative;
  margin-top: 16px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 15px;
}

/* LABEL */
.field label {
  position: absolute;
  left: 12px;
  top: 13px;
  color: #999;
  background: #fff;
  padding: 0 5px;
  transition: 0.2s;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:valid + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

/* ESTRELAS */
.stars {
  text-align: center;
  font-size: 30px;
  margin-top: 10px;
}

.star {
  color: #ccc;
  cursor: pointer;
  transition: 0.2s;
}

/* BOTÃO */
.big-btn {
  width: 100%;
  padding: 15px;
  margin-top: 18px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

/* FEEDBACK */
.feedback {
  background: #f9f9f9;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 14px;
}

/* WHATSAPP */
.whats {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 65px;
  height: 65px;
  background: #25d366;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  z-index: 999;
  animation: pulse 2s infinite;
}

.whats img {
  width: 30px;
}

/* PULSE */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ANIMAÇÃO ENVIO */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.box {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.check {
  font-size: 50px;
  color: #2ecc71;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="logo.png" class="logo">

<div class="titulo">
<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>
</div>

<div class="field">
<input id="atendente" placeholder=" ">
<label>Nome do atendente</label>
</div>

<div class="field">
<select id="atendimento" required>
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
<label>Atendimento</label>
</div>

<div class="field">
<select id="encontrou" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
<label>Encontrou?</label>
</div>

<div class="field">
<input id="produto" placeholder=" ">
<label>Produto</label>
</div>

<div class="field">
<select id="voltaria" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
<label>Voltaria?</label>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder=" "></textarea>
<label>Sugestões</label>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- BOTÃO WHATS -->
<a href="https://wa.me/5588997428848?text=Olá!%20💊%20Gostaria%20de%20saber%20sobre%20medicamentos%20e%20promoções.%20Pode%20me%20ajudar?"
class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<!-- ANIMAÇÃO -->
<div class="overlay" id="overlay">
<div class="box">
<div class="check">✔</div>
<p>Enviado com sucesso!</p>
</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfSgJveiEcP522pr5nLCHfRJdLjYzc0t70KhsJn9UmAP1q-OOWabTornfnhhFa43Ox/exec";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota = 0;
document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){

  let ultimo = localStorage.getItem("tempo");
  let agora = Date.now();

  if(ultimo && (agora - ultimo < 600000)){
    alert("Espere 10 minutos para avaliar novamente.");
    return;
  }

  let data = {
    atendente: document.getElementById("atendente").value,
    atendimento: document.getElementById("atendimento").value,
    encontrou: document.getElementById("encontrou").value,
    produto: document.getElementById("produto").value,
    voltaria: document.getElementById("voltaria").value,
    nota: nota,
    comentario: document.getElementById("comentario").value
  };

  fetch(SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(()=>{
    localStorage.setItem("tempo", agora);

    document.getElementById("overlay").style.display="flex";

    setTimeout(()=>location.reload(),2000);
  })
  .catch(()=>alert("Erro ao enviar"));
}

async function carregar(){
  try{
    let res = await fetch(URL);
    let data = await res.json();

    lista.innerHTML="";

    data.reverse().forEach(f=>{
      lista.innerHTML+=`
      <div class="feedback">
        ${f.Atendente ? "👤 " + f.Atendente + "<br>" : ""}
        ⭐ ${f.Nota}<br>
        ${f.Comentario || ""}
      </div>`;
    });

  }catch{
    lista.innerHTML="Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
