<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.8), rgba(22,160,133,0.8)),
    url('logo.png');
  background-size: cover;
  filter: blur(12px) brightness(0.9);
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 480px;
  margin: auto;
  padding: 15px;
  padding-bottom: 200px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 22px;
  margin-top: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* LOGO */
.logo {
  width: 90px;
  display: block;
  margin: auto;
}

/* TITULO */
h2 {
  text-align: center;
  font-size: 22px;
}

/* CAMPOS */
.field {
  margin: 12px 0;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #eee;
  background: #fafafa;
  font-size: 15px;
}

/* FOCO */
.field input:focus,
.field textarea:focus,
.field select:focus {
  border-color: #1abc9c;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(26,188,156,0.15);
  transform: scale(1.02);
}

/* LABEL */
.field label {
  font-size: 13px;
  margin-left: 5px;
}

/* ESTRELAS */
.stars {
  text-align: center;
  font-size: 26px;
}

.star {
  cursor: pointer;
  color: #ccc;
}

/* BOTÃO */
.big-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  font-size: 16px;
  background: #e53935;
  color: white;
  border: none;
  margin-top: 18px;
  transition: 0.2s;
}

.big-btn:active {
  transform: scale(0.96);
}

/* FEEDBACK */
.feedback {
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  background: #f9f9f9;
  border-left: 4px solid #1abc9c;
}

/* WHATS */
.whats {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 62px;
  height: 62px;
  background: #25d366;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: pulse 2s infinite;
}

.whats img {
  width: 30px;
}

@keyframes pulse {
  50% { transform: scale(1.1); }
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box {
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

.loader {
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #1abc9c;
  border-radius:50%;
  animation: spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.check {
  font-size:40px;
  color:#2ecc71;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 12px 20px;
  border-radius: 20px;
  z-index: 9999;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="logo.png" class="logo">

<h2>Farmácia Tem</h2>

<div class="field">
<label>Nome do atendente</label>
<input id="atendente">
</div>

<div class="field">
<label>Atendimento</label>
<select id="atendimento">
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="field">
<label>Encontrou?</label>
<select id="encontrou">
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<label>Produto</label>
<input id="produto">
</div>

<div class="field">
<label>Voltaria?</label>
<select id="voltaria">
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<label>Sugestões</label>
<textarea id="comentario"></textarea>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848?text=Olá!%20💊%20Gostaria%20de%20saber%20sobre%20medicamentos%20e%20promoções."
class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfSgJveiEcP522pr5nLCHfRJdLjYzc0t70KhsJn9UmAP1q-OOWabTornfnhhFa43Ox/exec";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota = 0;

document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){

  const tempoBloqueio = 10 * 60 * 1000;
  const ultimoEnvio = localStorage.getItem("ultimoEnvio");

  if (ultimoEnvio && (Date.now() - ultimoEnvio < tempoBloqueio)) {
    let restante = Math.ceil((tempoBloqueio - (Date.now() - ultimoEnvio)) / 60000);
    mostrarMensagem(`⏳ Aguarde ${restante} min`);
    return;
  }

  if(nota === 0){
    mostrarMensagem("⚠️ Dê uma nota");
    return;
  }

  mostrarLoading();

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      nota,
      comentario: document.getElementById("comentario").value
    })
  })
  .then(()=>{
    localStorage.setItem("ultimoEnvio", Date.now());
    mostrarSucesso();
    setTimeout(()=>location.reload(),2000);
  })
  .catch(()=>{
    mostrarMensagem("Erro ao enviar");
  });
}

/* ANIMAÇÕES */
function mostrarLoading(){
  let div = document.createElement("div");
  div.id = "overlay";
  div.innerHTML = `
    <div class="box">
      <div class="loader"></div>
      <p>Enviando...</p>
    </div>`;
  document.body.appendChild(div);
}

function mostrarSucesso(){
  let overlay = document.getElementById("overlay");
  overlay.innerHTML = `
    <div class="box">
      <div class="check">✔</div>
      <p>Enviado!</p>
    </div>`;
}

function mostrarMensagem(msg){
  let div = document.createElement("div");
  div.className = "toast";
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

/* FEEDBACK */
async function carregar(){
  let lista = document.getElementById("lista");

  try{
    let res = await fetch(URL);
    let data = await res.json();

    lista.innerHTML="";

    data.reverse().forEach(f=>{
      lista.innerHTML+=`
      <div class="feedback">
        ⭐ ${f.Nota}<br>
        ${f.Comentario || ""}
      </div>`;
    });

  }catch{
    lista.innerHTML="Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
