<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7f8;
}

.header {
  background: linear-gradient(135deg, #1abc9c, #16a085);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

h2, h3 {
  text-align: center;
}

.media {
  text-align: center;
  font-weight: bold;
  color: #16a085;
  margin-bottom: 15px;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

select, input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.stars {
  display: flex;
  justify-content: center;
  font-size: 30px;
  margin: 10px 0;
}

.star {
  color: #ccc;
  cursor: pointer;
}

.star.active {
  color: #16a085;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #e53935;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.feedback {
  background: #f9f9f9;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  border-left: 5px solid #1abc9c;
}
</style>
</head>

<body>

<div class="header">
  <h1>💊 Farmácia Tem</h1>
  <p>Sua saúde em primeiro lugar</p>
</div>

<div class="container">

  <div class="card">
    <h2>Avalie nosso atendimento</h2>
    <div id="media" class="media">Carregando...</div>

    <label>Como foi o atendimento?</label>
    <select id="atendimento">
      <option value="">Selecione</option>
      <option>Excelente</option>
      <option>Bom</option>
      <option>Regular</option>
      <option>Ruim</option>
    </select>

    <label>Encontrou o que precisava?</label>
    <select id="encontrou">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label>Produto procurado</label>
    <input type="text" id="produto">

    <label>Voltaria a comprar?</label>
    <select id="voltaria">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Talvez</option>
      <option>Não</option>
    </select>

    <label>Avaliação</label>
    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <textarea id="comentario" placeholder="Sugestões..."></textarea>

    <button class="btn" onclick="enviar()">Enviar Avaliação</button>
  </div>

  <div class="card">
    <h3>Feedback dos clientes</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

function enviar() {
  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const produto = document.getElementById("produto").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      atendimento,
      encontrou,
      produto,
      voltaria,
      nota,
      comentario
    })
  })
  .then(() => {
    alert("Obrigado pela avaliação!");
    location.reload();
  })
  .catch(() => {
    alert("Erro ao enviar, tente novamente.");
  });
}

const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

async function carregar(){
  try {
    const res = await fetch(URL);
    const data = await res.json();

    let total = 0;
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (!data.length) {
      document.getElementById("media").innerText = "Sem avaliações ainda";
      return;
    }

    data.reverse().forEach(f=>{
      total += Number(f.Nota || 0);

      let div = document.createElement("div");
      div.className = "feedback";
      div.innerHTML = `⭐ ${f.Nota || 0} - ${f.Comentario || ""}`;
      lista.appendChild(div);
    });

    let media = total / data.length;
    document.getElementById("media").innerText =
      "⭐ Média: " + media.toFixed(1);

  } catch (e) {
    document.getElementById("media").innerText = "Erro ao carregar dados";
  }
}

carregar();
</script>

</body>
</html>
