<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

/* FUNDO PREMIUM */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.7), rgba(22,160,133,0.7)),
    url('logo.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(12px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

@media (min-width: 700px) {
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
}

/* CARD PREMIUM */
.card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 22px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  animation: aparecer 0.6s ease;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

@keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.logo {
  width: 110px;
  display: block;
  margin: 0 auto 10px;
  border-radius: 12px;
}

.titulo {
  text-align: center;
}

.titulo h2 {
  margin: 5px 0;
}

.titulo p {
  color: #555;
  margin: 0;
}

.media {
  text-align: center;
  font-weight: bold;
  color: #16a085;
  margin-bottom: 15px;
}

label {
  display: block;
  text-align: center;
  margin-top: 18px;
  font-weight: 600;
}

select, input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #ddd;
  text-align: center;
}

textarea {
  text-align: left;
}

.stars {
  display: flex;
  justify-content: center;
  font-size: 34px;
  margin: 15px 0;
}

.star {
  color: #ccc;
  cursor: pointer;
}

.star.active {
  color: gold;
  text-shadow: 0 0 5px rgba(255,215,0,0.7);
}

/* BOTÃO PREMIUM */
.big-btn {
  width: 100%;
  padding: 16px;
  margin-top: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff4d4d, #e53935);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.big-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.whatsapp {
  background: #25d366;
}

/* FEEDBACK PREMIUM */
.feedback {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  border-left: 5px solid #1abc9c;
  text-align: center;
  transition: 0.3s;
}

.feedback:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="card">

    <img src="logo.jpg" class="logo">

    <div class="titulo">
      <h2>💊 Farmácia Tem</h2>
      <p>Avalie nosso atendimento</p>
    </div>

    <div id="media" class="media">Carregando...</div>

    <label>Como foi o atendimento?</label>
    <select id="atendimento">
      <option value="">Selecione</option>
      <option>Excelente</option>
      <option>Bom</option>
      <option>Regular</option>
      <option>Ruim</option>
    </select>

    <label>Encontrou o que precisava?</label>
    <select id="encontrou">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label>O que você procurava?</label>
    <input type="text" id="produto">

    <label>Voltaria a comprar?</label>
    <select id="voltaria">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Talvez</option>
      <option>Não</option>
    </select>

    <label>Avaliação</label>
    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <textarea id="comentario" placeholder="Sugestões..."></textarea>

    <button class="big-btn" onclick="enviar()">Enviar Avaliação</button>

    <!-- WhatsApp -->
    <a href="https://wa.me/5585988705364" target="_blank">
      <button class="big-btn whatsapp">Falar no WhatsApp</button>
    </a>

  </div>

  <!-- FEEDBACK -->
  <div class="card">
    <h3>💬 Feedback dos clientes</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

function enviar() {
  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const produto = document.getElementById("produto").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      atendimento,
      encontrou,
      produto,
      voltaria,
      nota,
      comentario
    })
  })
  .then(() => {
    alert("Obrigado pela avaliação!");
    location.reload();
  })
  .catch(() => {
    alert("Erro ao enviar!");
  });
}

const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

async function carregar(){
  try {
    const res = await fetch(URL);
    const data = await res.json();

    let total = 0;
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (!data.length) {
      document.getElementById("media").innerText = "Sem avaliações ainda";
      return;
    }

    data.reverse().forEach(f=>{
      total += Number(f.Nota || 0);

      let div = document.createElement("div");
      div.className = "feedback";
      div.innerHTML = `
        <b>⭐ ${f.Nota || 0}</b><br>
        ${f.Comentario || "Cliente satisfeito"}
      `;
      lista.appendChild(div);
    });

    let media = total / data.length;
    document.getElementById("media").innerText =
      "⭐ Média: " + media.toFixed(1);

  } catch (e) {
    document.getElementById("media").innerText = "Erro ao carregar dados";
  }
}

carregar();
</script>

</body>
</html>
