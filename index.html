<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa de Satisfação - Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* FUNDO ANIMADO */
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  background: linear-gradient(270deg, #e8f5e9, #c8e6c9, #a5d6a7);
  background-size: 600% 600%;
  animation: gradientMove 15s ease infinite;
}

/* ANIMAÇÃO DO FUNDO */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGO DESFOCADO NO FUNDO (CORRIGIDO) */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('logo.jpg');
  background-repeat: no-repeat;
  background-position: center;
  background-size: 350px;
  opacity: 0.12;
  filter: blur(6px);
  animation: floatLogo 8s ease-in-out infinite;
  z-index: 0;
}

/* MOVIMENTO SUAVE DO LOGO */
@keyframes floatLogo {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}

/* TEXTO */
.card h2 {
  text-align: center;
  color: #2e7d32;
  margin-bottom: 10px;
}

.card p {
  text-align: center;
  color: #555;
  margin-bottom: 20px;
}

/* INPUTS */
label {
  font-weight: 600;
  margin-top: 12px;
  display: block;
  color: #333;
}

input, select, textarea {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
  transition: 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: #2e7d32;
  outline: none;
  box-shadow: 0 0 5px rgba(46,125,50,0.2);
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* MENSAGEM */
.success {
  display: none;
  text-align: center;
  color: #2e7d32;
  font-weight: bold;
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: #e8f5e9;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>💊 Sua opinião importa</h2>
    <p>Farmácia Tem: Ajude-nos a melhorar</p>

    <form id="form">

      <label>Como foi o atendimento?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>

      <label>Encontrou o que precisava?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>O que você procurava?</label>
      <input type="text" placeholder="Ex: medicamentos, vitaminas...">

      <label>Voltaria a comprar conosco?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>

      <label>Sugestões</label>
      <textarea rows="3" placeholder="Deixe sua opinião..."></textarea>

      <button type="submit">Enviar avaliação</button>

    </form>

    <div id="msg" class="success">
      ✅ Obrigado pela sua resposta!
    </div>

  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("msg").style.display = "block";
  this.style.display = "none";
});
</script>

</body>
</html>
