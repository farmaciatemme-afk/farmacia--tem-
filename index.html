<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2, h3 {
  text-align: center;
}

/* estrelas */
.stars {
  display: flex;
  gap: 5px;
  font-size: 28px;
  cursor: pointer;
  justify-content: center;
  margin: 10px 0;
}

.star {
  color: #555;
}

.star.active {
  color: gold;
}

/* inputs */
select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* botão */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #007aff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #005ecb;
}

/* feedback */
.feedback {
  background: #2a2a2a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.media {
  text-align: center;
  font-size: 18px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>💊 Farmácia Tem</h2>

    <div id="media" class="media">⭐ Média: carregando...</div>

    <label>Atendimento</label>
    <select id="atendimento">
      <option value="">Selecione</option>
      <option>Excelente</option>
      <option>Bom</option>
      <option>Regular</option>
      <option>Ruim</option>
    </select>

    <label>Encontrou o produto?</label>
    <select id="encontrou">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label>Voltaria?</label>
    <select id="voltaria">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Talvez</option>
      <option>Não</option>
    </select>

    <label>Avaliação</label>
    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <textarea id="comentario" placeholder="Comentário..."></textarea>

    <button onclick="enviar()">Enviar</button>
  </div>

  <!-- FEEDBACK -->
  <div class="card">
    <h3>💬 Opiniões dos clientes</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

// estrelas
stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

// ENVIO
function enviar() {
  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    body: JSON.stringify({
      atendimento,
      encontrou,
      voltaria,
      nota,
      comentario
    })
  })
  .then(() => {
    alert("Feedback enviado!");
    location.reload();
  })
  .catch(() => alert("Erro ao enviar"));
}

// LINK DA TUA PLANILHA (JSON)
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

// carregar dados
async function carregar() {
  try {
    const res = await fetch(URL);
    const data = await res.json();

    let total = 0;
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.reverse().forEach(f => {
      total += Number(f.Nota);

      const div = document.createElement("div");
      div.className = "feedback";
      div.innerHTML = `
        ⭐ ${f.Nota}<br>
        ${f.Comentario || ""}
      `;
      lista.appendChild(div);
    });

    let media = total / data.length;
    document.getElementById("media").innerText =
      "⭐ Média: " + media.toFixed(1);

  } catch {
    document.getElementById("media").innerText = "Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
