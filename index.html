<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.8), rgba(22,160,133,0.8)),
    url('logo.png');
  background-size: cover;
  background-position: center;
  filter: blur(12px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  padding-bottom: 120px;
  position: relative;
  z-index: 1;
}

.tabs {
  display: flex;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  overflow: hidden;
}

.tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: white;
  color: #1abc9c;
}

.aba {
  display: none;
  opacity: 0;
  transform: translateY(15px);
  transition: 0.3s;
}

.aba.ativa {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 25px;
  margin-top: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.logo {
  width: 110px;
  display: block;
  margin: 10px auto;
}

.titulo {
  text-align: center;
}

.field {
  position: relative;
  margin: 18px auto;
  max-width: 500px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #ddd;
}

.field label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #999;
  transition: 0.2s;
  background: white;
  padding: 0 5px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

.stars {
  text-align: center;
  font-size: 28px;
}

.star { cursor: pointer; color: #ccc; }

.big-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  margin-top: 20px;
}

.whatsapp { background: #25d366; }

.feedback {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.whats-float {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #25d366;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.whats-float img { width: 30px; }
</style>
</head>

<body>

<div class="container">

<div class="tabs">
  <button class="tab active" onclick="trocarAba('form')">Avaliação</button>
  <button class="tab" onclick="trocarAba('whats')">WhatsApp</button>
</div>

<div id="form" class="aba ativa">

<div class="card">
<img src="logo.png" class="logo">

<div class="titulo">
<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>
</div>

<div class="field">
<select id="atendimento" required>
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
<label>Atendimento</label>
</div>

<div class="field">
<select id="encontrou" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
<label>Encontrou?</label>
</div>

<div class="field">
<input id="produto" placeholder=" ">
<label>Produto</label>
</div>

<div class="field">
<select id="voltaria" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
<label>Voltaria?</label>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder=" "></textarea>
<label>Sugestões</label>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>

</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<div id="whats" class="aba">
<div class="card" style="text-align:center;">
<h3>Fale conosco</h3>

<a href="https://wa.me/5588997428848?text=Olá!%20😊%20Vim%20pelo%20site%20da%20Farmácia%20Tem.%0A%0AGostaria%20de%20saber%20mais%20sobre%20produtos,%20preços%20e%20promoções.%0A%0APode%20me%20ajudar?" target="_blank">
<button class="big-btn whatsapp">Ir para WhatsApp</button>
</a>

</div>
</div>

</div>

<a href="https://wa.me/5588997428848?text=Olá!%20😊%20Vim%20pelo%20site%20da%20Farmácia%20Tem.%0A%0AGostaria%20de%20saber%20mais%20sobre%20produtos,%20preços%20e%20promoções.%0A%0APode%20me%20ajudar?" class="whats-float" target="_blank">
<img src="whatsapp.png">
</a>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

function trocarAba(id){
document.querySelectorAll(".aba").forEach(a=>a.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

let nota=0;
document.querySelectorAll(".star").forEach((s,i)=>{
s.onclick=()=>{nota=i+1;document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");};
});

function enviar(){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
atendimento:atendimento.value,
encontrou:encontrou.value,
produto:produto.value,
voltaria:voltaria.value,
nota,
comentario:comentario.value
})
}).then(()=>{alert("Enviado!");location.reload();});
}

async function carregar(){
let res=await fetch(URL);
let data=await res.json();
lista.innerHTML="";
data.reverse().forEach(f=>{
lista.innerHTML+=`<div class="feedback">⭐ ${f.Nota}<br>${f.Comentario||""}</div>`;
});
}

carregar();
</script>

</body>
</html>
