<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmácia Tem</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.logo{height:45px;}
.menu a{margin:0 10px;text-decoration:none;color:#333;font-weight:bold}
.btn{background:#1abc9c;color:#fff;padding:10px 15px;border-radius:10px}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:50px 20px;
background:linear-gradient(135deg,#1abc9c,#16a085);
color:#fff;
flex-wrap:wrap;
}
.hero-text{max-width:500px}
.hero h1{font-size:36px}
.hero p{margin:10px 0}
.hero img{width:250px;border-radius:50%;border:5px solid #fff}

/* FORM */
.container{
max-width:420px;
margin:20px auto;
padding:10px;
}
.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}
.field{margin:10px 0}
.field input,.field select,.field textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
}

/* STARS */
.stars{text-align:center;font-size:28px}
.star{cursor:pointer;color:#ccc}

/* BOTÃO */
.big-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#e53935;
color:#fff;
margin-top:10px;
}

/* FEEDBACK */
.feedback{
background:#f2f2f2;
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* WHATS */
.whats{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
animation:pulse 1.5s infinite;
}
.whats img{width:30px}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:#fff;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}
.loader{
width:60px;
height:60px;
border:6px solid #eee;
border-top:6px solid #1abc9c;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<img src="logo.png" class="logo">
<div class="menu">
<a>Início</a>
<a>Serviços</a>
<a>Promoções</a>
</div>
<a href="https://wa.me/5588997428848" class="btn">WhatsApp</a>
</div>

<!-- HERO -->
<div class="hero">
<div class="hero-text">
<h1>Sua saúde em primeiro lugar</h1>
<p>Atendimento rápido e medicamentos de qualidade</p>
</div>
<img src="logo.png">
</div>

<!-- FORM -->
<div class="container">

<div class="card">
<h2>Avaliação</h2>

<div class="field">
<input id="atendente" placeholder="Nome do atendente">
</div>

<div class="field">
<select id="atendimento">
<option value="">Atendimento</option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>

</div>

<div class="card">
<h3>Feedback (<span id="total">0</span>)</h3>
<div id="lista"></div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848" class="whats">
<img src="whatsapp.png">
</a>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
<div class="loader"></div>
<p>Enviando...</p>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const URL="https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota=0;

/* estrelas */
document.querySelectorAll(".star").forEach((s,i)=>{
s.onclick=()=>{
nota=i+1;
document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
};
});

/* enviar */
function enviar(){

let ultimo=localStorage.getItem("tempo");
let agora=Date.now();

if(ultimo && agora-ultimo<600000){
alert("Aguarde 10 minutos");
return;
}

overlay.style.display="flex";

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({nota:nota})
})
.then(()=>{
localStorage.setItem("tempo",agora);
setTimeout(()=>location.reload(),1500);
});
}

/* feedback automático */
async function carregar(){
let res=await fetch(URL);
let data=await res.json();

lista.innerHTML="";
total.innerText=data.length;

data.reverse().forEach(f=>{
if(!f.Nota)return;
lista.innerHTML+=`<div class="feedback">⭐ ${f.Nota}</div>`;
});
}

setInterval(carregar,5000);
carregar();

</script>

</body>
</html>
