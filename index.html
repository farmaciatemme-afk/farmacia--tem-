<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  background: #1abc9c;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.9), rgba(22,160,133,0.9)),
    url('logo.png');
  background-size: cover;
  filter: blur(10px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* LOGO */
.logo {
  width: 90px;
  display: block;
  margin: 10px auto;
}

.titulo {
  text-align: center;
}

/* CAMPOS */
.field {
  position: relative;
  margin: 15px 0;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 15px;
}

.field label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #999;
  background: #fff;
  padding: 0 5px;
  transition: 0.2s;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

/* ESTRELAS */
.stars {
  text-align: center;
  font-size: 28px;
}

.star {
  color: #ccc;
  cursor: pointer;
}

/* BOTÃO */
.big-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  margin-top: 20px;
  font-size: 16px;
}

/* FEEDBACK */
.feedback {
  background: #f9f9f9;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* WHATSAPP */
.whats {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.whats img {
  width: 32px;
}

/* ANIMAÇÃO */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.loader span {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="logo.png" class="logo">

<div class="titulo">
<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>
</div>

<div class="field">
<input id="atendente" placeholder=" ">
<label>Nome do atendente</label>
</div>

<div class="field">
<select id="atendimento" required>
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
<label>Atendimento</label>
</div>

<div class="field">
<select id="encontrou" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
<label>Encontrou?</label>
</div>

<div class="field">
<input id="produto" placeholder=" ">
<label>Produto</label>
</div>

<div class="field">
<select id="voltaria" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
<label>Voltaria?</label>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder=" "></textarea>
<label>Sugestões</label>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848?text=Olá! 💊 Gostaria de saber sobre medicamentos disponíveis e promoções. Pode me ajudar?"
class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<!-- ANIMAÇÃO -->
<div class="overlay" id="overlay">
  <div class="loader">
    ⏳
    <span>Enviando...</span>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota = 0;

// estrelas
document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

// ENVIAR
function enviar(){

  let ultimo = localStorage.getItem("tempoEnvio");
  let agora = Date.now();

  if(ultimo && agora - ultimo < 600000){
    alert("Aguarde 10 minutos para enviar outra avaliação");
    return;
  }

  let atendente = document.getElementById("atendente").value;
  let atendimento = document.getElementById("atendimento").value;
  let encontrou = document.getElementById("encontrou").value;
  let produto = document.getElementById("produto").value;
  let voltaria = document.getElementById("voltaria").value;
  let comentario = document.getElementById("comentario").value;

  if(!atendente || !atendimento || !encontrou || !voltaria || nota===0){
    alert("Preencha tudo!");
    return;
  }

  document.getElementById("overlay").style.display = "flex";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      atendente,
      atendimento,
      encontrou,
      produto,
      voltaria,
      nota,
      comentario
    })
  })
  .then(()=>{
    localStorage.setItem("tempoEnvio", agora);

    document.querySelector(".loader").innerHTML = "✅<span>Enviado com sucesso!</span>";

    setTimeout(()=>location.reload(), 2000);
  })
  .catch(()=>{
    alert("Erro ao enviar");
  });
}

// CARREGAR
async function carregar(){
  try{
    let res = await fetch(URL);
    let data = await res.json();

    lista.innerHTML="";

    data.reverse().forEach(f=>{
      if(!f.Nota) return;

      lista.innerHTML+=`
      <div class="feedback">
        ⭐ ${f.Nota}<br>
        ${f.Comentario || ""}
      </div>`;
    });

  }catch{
    lista.innerHTML="Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
