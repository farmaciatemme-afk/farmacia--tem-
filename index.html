<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7f8;
  display: flex;
  justify-content: center;
}

/* fundo suave */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #1abc9c, #16a085);
  opacity: 0.08;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

@media (min-width: 700px) {
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
}

.card {
  background: white;
  border-radius: 20px;
  padding: 22px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.logo {
  width: 110px;
  display: block;
  margin: 0 auto 15px;
  border-radius: 12px;
}

h2, h3 {
  text-align: center;
  color: #222;
}

.media {
  text-align: center;
  font-weight: bold;
  color: #16a085;
  margin-bottom: 15px;
}

label {
  display: block;
  text-align: center;
  margin-top: 18px;
  font-weight: 600;
  color: #333;
}

select, input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  text-align: center;
}

textarea {
  text-align: left;
}

.stars {
  display: flex;
  justify-content: center;
  font-size: 34px;
  margin: 15px 0;
}

.star {
  color: #ccc;
  cursor: pointer;
}

.star.active {
  color: #16a085;
}

.big-btn {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.big-btn:hover {
  background: #c62828;
}

.feedback {
  background: #f9f9f9;
  padding: 14px;
  border-radius: 14px;
  margin-top: 10px;
  border-left: 5px solid #1abc9c;
}
</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="card">

    <img src="logo.jpg" class="logo">

    <h2>💊 Avalie nosso atendimento</h2>

    <div id="media" class="media">Carregando...</div>

    <label>Como foi o atendimento?</label>
    <select id="atendimento">
      <option value="">Selecione</option>
      <option>Excelente</option>
      <option>Bom</option>
      <option>Regular</option>
      <option>Ruim</option>
    </select>

    <label>Encontrou o que precisava?</label>
    <select id="encontrou">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Não</option>
    </select>

    <label>O que você procurava?</label>
    <input type="text" id="produto">

    <label>Voltaria a comprar?</label>
    <select id="voltaria">
      <option value="">Selecione</option>
      <option>Sim</option>
      <option>Talvez</option>
      <option>Não</option>
    </select>

    <label>Avaliação</label>
    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <textarea id="comentario" placeholder="Sugestões..."></textarea>

    <button class="big-btn" onclick="enviar()">Enviar</button>
  </div>

  <!-- FEEDBACK -->
  <div class="card">
    <h3>💬 Feedback dos clientes</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

function enviar() {
  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const produto = document.getElementById("produto").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    body: JSON.stringify({
      atendimento,
      encontrou,
      produto,
      voltaria,
      nota,
      comentario
    })
  })
  .then(() => {
    alert("Obrigado!");
    location.reload();
  });
}

const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

async function carregar(){
  const res = await fetch(URL);
  const data = await res.json();

  let total = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.reverse().forEach(f=>{
    total += Number(f.Nota);

    let div = document.createElement("div");
    div.className = "feedback";
    div.innerHTML = `⭐ ${f.Nota} - ${f.Comentario || ""}`;
    lista.appendChild(div);
  });

  let media = total / data.length;
  document.getElementById("media").innerText =
    "⭐ Média: " + media.toFixed(1);
}

carregar();
</script>

</body>
</html>
