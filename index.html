<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa de Satisfação - Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  width: 100%;
  max-width: 420px;
}

/* Topo */
.header {
  text-align: center;
  margin-bottom: 15px;
}

.header img {
  width: 100px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 22px;
  color: #2e7d32;
}

/* Card */
.card {
  background: #fff;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.card p {
  text-align: center;
  color: #666;
  margin-bottom: 20px;
}

/* Inputs */
label {
  font-weight: 600;
  margin-top: 12px;
  display: block;
  color: #333;
}

input, select, textarea {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
}

input:focus, select:focus, textarea:focus {
  border-color: #2e7d32;
  outline: none;
  box-shadow: 0 0 5px rgba(46,125,50,0.2);
}

/* Botão */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

/* Mensagem */
.success {
  display: none;
  text-align: center;
  color: #2e7d32;
  font-weight: bold;
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: #e8f5e9;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <!-- IMPORTANTE: nome igual ao GitHub -->
    <img src="logo.jpg" alt="Logo Farmácia Tem">
    <h1>Farmácia Tem</h1>
  </div>

  <div class="card">
    <p>💊 Sua opinião é muito importante para nós</p>

    <form id="form">

      <label>Como foi o atendimento?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>

      <label>Encontrou o que precisava?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>O que você procurava?</label>
      <input type="text" placeholder="Ex: medicamentos, vitaminas...">

      <label>Voltaria a comprar conosco?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>

      <label>Sugestões</label>
      <textarea rows="3" placeholder="Deixe sua opinião..."></textarea>

      <button type="submit">Enviar avaliação</button>

    </form>

    <div id="msg" class="success">
      ✅ Obrigado pela sua resposta!
    </div>

  </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("msg").style.display = "block";
  this.style.display = "none";
});
</script>

</body>
</html>
