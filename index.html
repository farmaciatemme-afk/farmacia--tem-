<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farmácia Tem</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1abc9c,#16a085);
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:20px;
  margin-top:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}

/* 🔥 LOGO ANIMADA */
.logo{
  width:110px;
  display:block;
  margin:18px auto 10px;
  border-radius:20px;
  background:#fff;
  padding:10px;
  box-shadow:0 10px 28px rgba(0,0,0,0.2);
  position:relative;
  overflow:hidden;

  animation:logoEntrada 0.8s ease, logoFloat 3s ease-in-out infinite;
}

@keyframes logoEntrada{
  from{opacity:0;transform:translateY(-15px) scale(0.9);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

@keyframes logoFloat{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

/* brilho */
.logo::after{
  content:"";
  position:absolute;
  width:120%;
  height:120%;
  top:-10%;
  left:-10%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  transform:rotate(25deg);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{transform:translateX(-100%) rotate(25deg)}
  100%{transform:translateX(100%) rotate(25deg)}
}

/* TITULO */
h2{text-align:center;margin:0}
p{text-align:center;color:#666}

/* CAMPOS */
.field{margin:12px 0}
.field input,
.field select,
.field textarea{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid #ddd;
}

/* ESTRELAS */
.stars{text-align:center;font-size:30px}
.star{color:#ccc;cursor:pointer}

/* BOTÃO */
.big-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#e53935;
  color:#fff;
  margin-top:15px;
}

/* FEEDBACK */
.feedback{
  background:#f6f6f6;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

/* WHATS */
.whats{
  position:fixed;
  bottom:18px;
  right:18px;
  width:70px;
  height:70px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.1)}
}

.whats img{width:34px}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.loader{
  width:60px;
  height:60px;
  border:6px solid #eee;
  border-top:6px solid #1abc9c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>

<div class="field">
<input id="atendente" placeholder="Nome do atendente">
</div>

<div class="field">
<select id="atendimento">
<option value="">Atendimento</option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="field">
<select id="encontrou">
<option value="">Encontrou?</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<input id="produto" placeholder="Produto">
</div>

<div class="field">
<select id="voltaria">
<option value="">Voltaria?</option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder="Sugestões"></textarea>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback (<span id="total">0</span>)</h3>
<div id="lista"></div>
</div>

</div>

<a href="https://wa.me/5588997428848" class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<div class="overlay" id="overlay">
<div class="loader"></div>
<p>Enviando...</p>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const URL="https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota=0;

document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){
  let agora=Date.now();
  let ultimo=localStorage.getItem("tempo");

  if(ultimo && agora-ultimo<600000){
    alert("Espere 10 minutos");
    return;
  }

  overlay.style.display="flex";

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      atendente:atendente.value,
      atendimento:atendimento.value,
      encontrou:encontrou.value,
      produto:produto.value,
      voltaria:voltaria.value,
      nota:nota,
      comentario:comentario.value
    })
  }).then(()=>{

    localStorage.setItem("tempo",agora);

    setTimeout(()=>{
      window.open("https://g.page/r/Cewsxt13lIojEAE/review","_blank");
      location.reload();
    },2000);

  });
}

async function carregar(){
  let res=await fetch(URL);
  let data=await res.json();

  lista.innerHTML="";
  total.innerText=data.length;

  data.reverse().forEach(f=>{
    if(!f.Nota) return;
    lista.innerHTML+=`<div class="feedback">⭐ ${f.Nota}<br>${f.Comentario||""}</div>`;
  });
}

setInterval(carregar,5000);
carregar();
</script>

</body>
</html>
