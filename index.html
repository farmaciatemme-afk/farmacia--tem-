<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa - Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* REMOVE QUALQUER VERDE */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black; /* fundo base */
  position: relative;
  overflow: hidden;
}

/* LOGO COMO FUNDO TOTAL */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("logo.jpg") no-repeat center;
  background-size: cover;
  filter: blur(15px);
  transform: scale(1.2);
  opacity: 0.5;
}

/* CARD */
.container {
  position: relative;
  z-index: 1;
}

.card {
  width: 350px;
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TEXTOS */
h2 {
  text-align: center;
  margin-bottom: 10px;
}

p {
  text-align: center;
  margin-bottom: 20px;
  color: #444;
}

/* INPUTS */
label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTÃO */
button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #222; /* sem verde */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #000;
}

/* MENSAGEM */
.success {
  display: none;
  text-align: center;
  margin-top: 15px;
  color: green;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>💊 Sua opinião importa</h2>
    <p>Farmácia Tem</p>

    <form id="form">

      <label>Como foi o atendimento?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>

      <label>Encontrou o que precisava?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>

      <label>O que você procurava?</label>
      <input type="text">

      <label>Voltaria a comprar?</label>
      <select required>
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>

      <label>Sugestões</label>
      <textarea></textarea>

      <button type="submit">Enviar</button>

    </form>

    <div id="msg" class="success">Obrigado!</div>
  </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("msg").style.display = "block";
  this.style.display = "none";
});
</script>

</body>
</html>
