<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.8), rgba(22,160,133,0.8)),
    url('logo.png');
  background-size: cover;
  filter: blur(8px);
}

/* CONTAINER */
.container {
  max-width: 900px;
  padding: 20px;
  padding-bottom: 160px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 25px;
  margin-top: 25px;
}

/* LOGO */
.logo {
  width: 110px;
  display: block;
  margin: auto;
}

/* INPUT */
.field {
  position: relative;
  margin: 18px auto;
  max-width: 500px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #ddd;
}

.field label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #999;
  background: white;
  padding: 0 5px;
  transition: 0.2s;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

/* ESTRELAS */
.stars {
  text-align: center;
  font-size: 28px;
}

.star {
  cursor: pointer;
  color: #ccc;
}

/* BOTÃO */
.big-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  margin-top: 20px;
}

/* FEEDBACK */
.feedback {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.08);
}

/* WHATS */
.whats {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 65px;
  height: 65px;
  background: #25d366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  animation: pulse 2s infinite;
}

.whats img {
  width: 32px;
}

@keyframes pulse {
  50% { transform: scale(1.1); }
}

/* OVERLAY */
#overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  animation: scaleUp 0.3s ease;
}

@keyframes scaleUp{
  from{ transform:scale(0.8); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

/* LOADER */
.loader{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #1abc9c;
  border-radius:50%;
  animation: spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* CHECK */
.check{
  font-size:40px;
  color:#2ecc71;
}

/* TOAST */
.toast{
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 12px 20px;
  border-radius: 20px;
  z-index: 9999;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="logo.png" class="logo">

<h2 style="text-align:center;">Farmácia Tem</h2>

<div class="field">
<input id="atendente" placeholder=" ">
<label>Nome do atendente</label>
</div>

<div class="field">
<select id="atendimento" required>
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
<label>Atendimento</label>
</div>

<div class="field">
<select id="encontrou" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
<label>Encontrou?</label>
</div>

<div class="field">
<input id="produto" placeholder=" ">
<label>Produto</label>
</div>

<div class="field">
<select id="voltaria" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
<label>Voltaria?</label>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder=" "></textarea>
<label>Sugestões</label>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848?text=Olá!%20💊%20Gostaria%20de%20saber%20sobre%20medicamentos%20e%20promoções."
class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfSgJveiEcP522pr5nLCHfRJdLjYzc0t70KhsJn9UmAP1q-OOWabTornfnhhFa43Ox/exec";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota = 0;

document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

/* ENVIAR */
function enviar(){

  const tempoBloqueio = 10 * 60 * 1000;
  const ultimoEnvio = localStorage.getItem("ultimoEnvio");

  if (ultimoEnvio && (Date.now() - ultimoEnvio < tempoBloqueio)) {
    let restante = Math.ceil((tempoBloqueio - (Date.now() - ultimoEnvio)) / 60000);
    mostrarMensagem(`⏳ Aguarde ${restante} min`);
    return;
  }

  if(nota === 0){
    mostrarMensagem("⚠️ Dê uma nota");
    return;
  }

  mostrarLoading();

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      nota: nota,
      comentario: document.getElementById("comentario").value
    })
  })
  .then(()=>{
    localStorage.setItem("ultimoEnvio", Date.now());
    mostrarSucesso();
    setTimeout(()=>location.reload(),2000);
  })
  .catch(()=>{
    mostrarMensagem("Erro ao enviar");
  });
}

/* ANIMAÇÕES */
function mostrarLoading(){
  let div = document.createElement("div");
  div.id = "overlay";
  div.innerHTML = `
    <div class="box">
      <div class="loader"></div>
      <p>Enviando...</p>
    </div>`;
  document.body.appendChild(div);
}

function mostrarSucesso(){
  let overlay = document.getElementById("overlay");
  overlay.innerHTML = `
    <div class="box">
      <div class="check">✔</div>
      <p>Enviado com sucesso!</p>
    </div>`;
}

function mostrarMensagem(msg){
  let div = document.createElement("div");
  div.className = "toast";
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}

/* FEEDBACK */
async function carregar(){
  let lista = document.getElementById("lista");

  try{
    let res = await fetch(URL);
    let data = await res.json();

    lista.innerHTML="";

    data.reverse().forEach(f=>{
      lista.innerHTML+=`
      <div class="feedback">
        ⭐ ${f.Nota}<br>
        ${f.Comentario || ""}
      </div>`;
    });

  }catch{
    lista.innerHTML="Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
