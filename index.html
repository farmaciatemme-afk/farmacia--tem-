<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.8), rgba(22,160,133,0.8)),
    url('logo.png');
  background-size: cover;
  background-position: center;
  filter: blur(8px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  padding-bottom: 160px;
  position: relative;
  z-index: 1;
}

.tabs {
  display: flex;
  margin-bottom: 15px;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  overflow: hidden;
}

.tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: white;
  color: #1abc9c;
}

.aba { display: none; }
.aba.ativa { display: block; }

.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 25px;
  margin-top: 25px;
}

.logo {
  width: 110px;
  display: block;
  margin: 10px auto;
}

.titulo { text-align: center; }

.field {
  position: relative;
  margin: 18px auto;
  max-width: 500px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid #ddd;
}

.field label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #999;
  transition: 0.2s;
  background: white;
  padding: 0 5px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #1abc9c;
}

.stars {
  text-align: center;
  font-size: 28px;
}

.star { cursor: pointer; color: #ccc; }

.big-btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #e53935;
  color: white;
  margin-top: 20px;
}

.feedback {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<img src="logo.png" class="logo">

<div class="titulo">
<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>
</div>

<!-- ATENDENTE -->
<div class="field">
<input id="atendente" placeholder=" " required>
<label>Nome do atendente</label>
</div>

<div class="field">
<select id="atendimento" required>
<option value="" disabled selected></option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
<label>Atendimento</label>
</div>

<div class="field">
<select id="encontrou" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Não</option>
</select>
<label>Encontrou?</label>
</div>

<div class="field">
<input id="produto" placeholder=" ">
<label>Produto</label>
</div>

<div class="field">
<select id="voltaria" required>
<option value="" disabled selected></option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
<label>Voltaria?</label>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder=" "></textarea>
<label>Sugestões</label>
</div>

<button class="big-btn" onclick="enviar()">Enviar</button>
</div>

<div class="card">
<h3>Feedback</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<script>
const SCRIPT_URL = "COLE_SEU_LINK_AQUI";
const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

const atendente = document.getElementById("atendente");
const atendimento = document.getElementById("atendimento");
const encontrou = document.getElementById("encontrou");
const produto = document.getElementById("produto");
const voltaria = document.getElementById("voltaria");
const comentario = document.getElementById("comentario");
const lista = document.getElementById("lista");

let nota = 0;
document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){
  if(!atendente.value || !atendimento.value || !encontrou.value || !voltaria.value || nota===0){
    alert("Preencha tudo!");
    return;
  }

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      atendente: atendente.value,
      atendimento: atendimento.value,
      encontrou: encontrou.value,
      produto: produto.value,
      voltaria: voltaria.value,
      nota,
      comentario: comentario.value
    })
  })
  .then(()=>{
    alert("Enviado com sucesso!");
    location.reload();
  })
  .catch(()=>{
    alert("Erro ao enviar");
  });
}

async function carregar(){
  try {
    let res = await fetch(URL);
    let data = await res.json();

    lista.innerHTML="";
    data.reverse().forEach(f=>{
      lista.innerHTML+=`
        <div class="feedback">
          👤 ${f.Atendente || "Não informado"}<br>
          ⭐ ${f.Nota}<br>
          ${f.Comentario || ""}
        </div>`;
    });
  } catch {
    lista.innerHTML="Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
