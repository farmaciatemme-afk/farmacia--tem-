<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farmácia Tem</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

/* HEADER PREMIUM */
.header{
  background:linear-gradient(135deg,#1abc9c,#16a085);
  color:#fff;
  text-align:center;
  padding:40px 20px 80px;
}

.logo{
  width:120px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.header h1{margin:10px 0 5px}
.header p{opacity:.9}

/* CARD */
.container{
  max-width:420px;
  margin:-60px auto 20px;
  padding:10px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* CAMPOS */
.field{margin:12px 0}
.field input,
.field select,
.field textarea{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* ESTRELAS */
.stars{text-align:center;font-size:30px}
.star{color:#ccc;cursor:pointer}

/* BOTÃO */
.big-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#e53935;
  color:#fff;
  font-weight:bold;
}

/* FEEDBACK */
.feedback{
  background:#f1f1f1;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

/* WHATS */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

.whats img{width:30px}

/* LOADING */
.overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

.loader{
  width:60px;
  height:60px;
  border:6px solid #eee;
  border-top:6px solid #1abc9c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="logo.png" class="logo">
<h1>Farmácia Tem</h1>
<p>Sua opinião é muito importante</p>
</div>

<div class="container">

<div class="card">

<div class="field">
<input id="atendente" placeholder="Nome do atendente">
</div>

<div class="field">
<select id="atendimento">
<option value="">Atendimento</option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="field">
<select id="encontrou">
<option value="">Encontrou?</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<input id="produto" placeholder="Produto">
</div>

<div class="field">
<select id="voltaria">
<option value="">Voltaria?</option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder="Sugestões"></textarea>
</div>

<button class="big-btn" onclick="enviar()">Enviar avaliação</button>

</div>

<div class="card">
<h3>Feedback (<span id="total">0</span>)</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<!-- WHATS -->
<a href="https://wa.me/5588997428848" class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<!-- LOADING -->
<div class="overlay" id="overlay">
<div class="loader"></div>
<p>Enviando...</p>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const GOOGLE_REVIEW="https://g.page/r/Cewsxt13lIojEAE/review";
const URL="https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

let nota=0;

document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){

  if(!atendente.value || !atendimento.value || !encontrou.value || !voltaria.value || nota===0){
    alert("Preencha tudo!");
    return;
  }

  let ultimo=localStorage.getItem("tempo");
  let agora=Date.now();

  if(ultimo && agora-ultimo<600000){
    alert("Aguarde 10 minutos");
    return;
  }

  overlay.style.display="flex";

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      atendente:atendente.value,
      atendimento:atendimento.value,
      encontrou:encontrou.value,
      produto:produto.value,
      voltaria:voltaria.value,
      nota:nota,
      comentario:comentario.value
    })
  })
  .then(()=>{
    localStorage.setItem("tempo",agora);

    setTimeout(()=>{
      window.location.href=GOOGLE_REVIEW;
    },1500);
  });
}

async function carregar(){
  let res=await fetch(URL);
  let data=await res.json();

  lista.innerHTML="";
  total.innerText=data.length;

  data.reverse().forEach(f=>{
    if(!f.Nota) return;

    lista.innerHTML+=`
    <div class="feedback">
      ⭐ ${f.Nota}<br>
      ${f.Comentario||""}
    </div>`;
  });
}

setInterval(carregar,5000);
carregar();

</script>

</body>
</html>
