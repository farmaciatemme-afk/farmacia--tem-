<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Farmácia Tem</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(26,188,156,0.7), rgba(22,160,133,0.7)),
    url('logo.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(12px);
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 900px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 22px;
  margin-bottom: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  animation: aparecer 0.6s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: 100px;
  display: block;
  margin: 0 auto 10px;
  border: none;
  background: transparent;
  box-shadow: none;
}

.titulo {
  text-align: center;
}

.titulo h2 {
  margin: 5px 0;
}

.titulo p {
  margin: 0;
  color: #555;
}

/* CAMPOS */
.field {
  position: relative;
  margin-top: 20px;
}

.field input,
.field textarea,
.field select {
  width: 100%;
  box-sizing: border-box;
  padding: 16px 12px 8px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  transition: 0.3s;
  background: white;
}

.field label {
  position: absolute;
  top: 12px;
  left: 12px;
  font-size: 13px;
  color: #777;
  pointer-events: none;
  transition: 0.2s;
}

/* FOCO */
.field input:focus,
.field textarea:focus,
.field select:focus {
  outline: none;
  border-color: #1abc9c;
  box-shadow: 0 0 0 3px rgba(26,188,156,0.2);
  transform: scale(1.01);
}

/* LABEL FLUTUANTE */
.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field textarea:focus + label,
.field textarea:not(:placeholder-shown) + label {
  top: -8px;
  left: 10px;
  background: white;
  padding: 0 5px;
  font-size: 11px;
  color: #1abc9c;
}

/* ESTRELAS */
.stars {
  display: flex;
  justify-content: center;
  font-size: 30px;
  margin: 15px 0;
}

.star {
  color: #ccc;
  cursor: pointer;
}

.star.active {
  color: gold;
  text-shadow: 0 0 5px rgba(255,215,0,0.7);
}

/* BOTÃO */
.big-btn {
  width: 100%;
  padding: 16px;
  margin-top: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #ff4d4d, #e53935);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.25s;
}

.big-btn:hover {
  transform: scale(1.05);
}

.big-btn:active {
  transform: scale(0.97);
}

.whatsapp {
  background: #25d366;
}

/* FEEDBACK */
.feedback {
  background: rgba(255,255,255,0.6);
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <img src="logo.jpg" class="logo">

    <div class="titulo">
      <h2>💊 Farmácia Tem</h2>
      <p>Avalie nosso atendimento</p>
    </div>

    <div id="media" style="text-align:center;margin-bottom:10px;">Carregando...</div>

    <div class="field">
      <select id="atendimento">
        <option value=""></option>
        <option>Excelente</option>
        <option>Bom</option>
        <option>Regular</option>
        <option>Ruim</option>
      </select>
      <label>Como foi o atendimento?</label>
    </div>

    <div class="field">
      <select id="encontrou">
        <option value=""></option>
        <option>Sim</option>
        <option>Não</option>
      </select>
      <label>Encontrou o que precisava?</label>
    </div>

    <div class="field">
      <input type="text" id="produto" placeholder=" ">
      <label>O que você procurava?</label>
    </div>

    <div class="field">
      <select id="voltaria">
        <option value=""></option>
        <option>Sim</option>
        <option>Talvez</option>
        <option>Não</option>
      </select>
      <label>Voltaria a comprar?</label>
    </div>

    <label style="text-align:center;">Avaliação</label>
    <div class="stars">
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </div>

    <div class="field">
      <textarea id="comentario" placeholder=" "></textarea>
      <label>Sugestões</label>
    </div>

    <button class="big-btn" onclick="enviar()">Enviar Avaliação</button>

    <a href="https://wa.me/5585988705364" target="_blank">
      <button class="big-btn whatsapp">Falar no WhatsApp</button>
    </a>

  </div>

  <div class="card">
    <h3 style="text-align:center;">💬 Feedback</h3>
    <div id="lista"></div>
  </div>

</div>

<script>
let nota = 0;
const stars = document.querySelectorAll(".star");

stars.forEach((star, index) => {
  star.onclick = () => {
    nota = index + 1;
    stars.forEach((s,i)=> s.classList.toggle("active", i<nota));
  };
});

function enviar() {
  const atendimento = document.getElementById("atendimento").value;
  const encontrou = document.getElementById("encontrou").value;
  const produto = document.getElementById("produto").value;
  const voltaria = document.getElementById("voltaria").value;
  const comentario = document.getElementById("comentario").value;

  if (!atendimento || !encontrou || !voltaria || nota === 0) {
    alert("Preencha tudo!");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbyZ5LUQ8E85zzQfoG3t-JEIWl5VTUnYPvnSduIm83uzAdr2GwwF3XbldHKqaLK0lChj/exec", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ atendimento, encontrou, produto, voltaria, nota, comentario })
  })
  .then(() => {
    alert("Obrigado!");
    location.reload();
  });
}

const URL = "https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1";

async function carregar(){
  try {
    const res = await fetch(URL);
    const data = await res.json();

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.reverse().forEach(f=>{
      let div = document.createElement("div");
      div.className = "feedback";
      div.innerHTML = `<b>⭐ ${f.Nota}</b><br>${f.Comentario || ""}`;
      lista.appendChild(div);
    });
  } catch {
    document.getElementById("media").innerText = "Erro ao carregar";
  }
}

carregar();
</script>

</body>
</html>
