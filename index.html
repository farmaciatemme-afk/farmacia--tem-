<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farmácia Tem</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#1abc9c,#16a085);
  display:flex;
  justify-content:center;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:420px;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:25px;
  padding:22px;
  margin-top:20px;
  box-shadow:0 15px 35px rgba(0,0,0,.2);
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1}
}

/* LOGO */
.logo{
  width:120px;
  display:block;
  margin:0 auto 10px;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

/* TITULO */
h2{text-align:center;margin-bottom:5px}
p{text-align:center;color:#666;margin-bottom:15px}

/* CAMPOS */
.field{margin:12px 0}

.field input,
.field select,
.field textarea{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:15px;
}

/* ESTRELAS */
.stars{
  text-align:center;
  font-size:30px;
  margin:10px 0;
}

.star{
  color:#ccc;
  cursor:pointer;
  transition:.2s;
}

/* BOTÃO */
.big-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#e53935;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  margin-top:10px;
  transition:.3s;
}

.big-btn:hover{
  transform:scale(1.03);
}

/* FEEDBACK */
.feedback{
  background:#f4f4f4;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
}

/* WHATS */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

.whats img{width:35px}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader{
  width:60px;
  height:60px;
  border:6px solid #eee;
  border-top:6px solid #1abc9c;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h2>Farmácia Tem</h2>
<p>Avalie nosso atendimento</p>

<div class="field">
<input id="atendente" placeholder="Nome do atendente">
</div>

<div class="field">
<select id="atendimento">
<option value="">Atendimento</option>
<option>Excelente</option>
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>
</div>

<div class="field">
<select id="encontrou">
<option value="">Encontrou?</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="field">
<input id="produto" placeholder="Produto">
</div>

<div class="field">
<select id="voltaria">
<option value="">Voltaria?</option>
<option>Sim</option>
<option>Talvez</option>
<option>Não</option>
</select>
</div>

<div class="stars">
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
</div>

<div class="field">
<textarea id="comentario" placeholder="Sugestões"></textarea>
</div>

<button class="big-btn" onclick="enviar()">Enviar avaliação</button>

</div>

<div class="card">
<h3>Feedback (<span id="total">0</span>)</h3>
<div id="lista">Carregando...</div>
</div>

</div>

<a href="https://wa.me/5588997428848" class="whats" target="_blank">
<img src="whatsapp.png">
</a>

<div class="overlay" id="overlay">
<div class="loader"></div>
<p style="margin-top:10px">Enviando...</p>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0TtRNqQYFQa_uUC7QwkWEURw31deDCIcbb6iaNzjAEcetpT3OYTOU9R8QxsyevjXZ/exec";
const GOOGLE="https://g.page/r/Cewsxt13lIojEAE/review";

let nota=0;

document.querySelectorAll(".star").forEach((s,i)=>{
  s.onclick=()=>{
    nota=i+1;
    document.querySelectorAll(".star").forEach((e,j)=>e.style.color=j<nota?"gold":"#ccc");
  };
});

function enviar(){

if(!atendente.value || !atendimento.value || !encontrou.value || !voltaria.value || nota===0){
  alert("Preencha tudo!");
  return;
}

let ultimo=localStorage.getItem("tempo");
let agora=Date.now();

if(ultimo && agora-ultimo<600000){
  alert("Aguarde 10 minutos");
  return;
}

overlay.style.display="flex";

fetch(SCRIPT_URL,{
  method:"POST",
  body:JSON.stringify({
    atendente:atendente.value,
    atendimento:atendimento.value,
    encontrou:encontrou.value,
    produto:produto.value,
    voltaria:voltaria.value,
    nota:nota,
    comentario:comentario.value
  })
})
.then(()=>{
  localStorage.setItem("tempo",agora);
  setTimeout(()=>{
    window.location.href=GOOGLE;
  },1500);
})
.catch(()=>{
  alert("Erro");
});
}

async function carregar(){
  let res=await fetch("https://opensheet.elk.sh/1m3oGfZpmDmqNetTjWFtbSMPdkdAYfQl6soJp1BXoKIA/Página1");
  let data=await res.json();

  lista.innerHTML="";
  total.innerText=data.length;

  data.reverse().forEach(f=>{
    if(!f.Nota) return;

    lista.innerHTML+=`
    <div class="feedback">
      ⭐ ${f.Nota}<br>
      ${f.Comentario||""}
    </div>`;
  });
}

setInterval(carregar,5000);
carregar();

</script>

</body>
</html>
